name: Android Debug Build

on:
  pull_request:
    types: [synchronize, reopened, labeled]
    branches: [ main ]

concurrency:
  group: android-debug-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'apk')
    runs-on: self-hosted

    steps:
      - name: Pre-clean workspace
        shell: pwsh
        run: |
          Get-Process Unity, UnityHub, UnityPackageManager, UnityCrashHandler64 -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
          if (Test-Path "$env:GITHUB_WORKSPACE") {
            Get-ChildItem -Force "$env:GITHUB_WORKSPACE" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0

      - name: Ensure project not locked
        shell: pwsh
        run: |
          Get-Process Unity, UnityHub, UnityPackageManager, UnityCrashHandler64 -ErrorAction SilentlyContinue | `
            Stop-Process -Force -ErrorAction SilentlyContinue
          if (Test-Path "$env:GITHUB_WORKSPACE\Temp\UnityLockfile") {
            Remove-Item -Force "$env:GITHUB_WORKSPACE\Temp\UnityLockfile"
          }

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: android-library-${{ runner.os }}-${{ hashFiles('Packages/manifest.json','ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            android-library-${{ runner.os }}-

      - name: Activate Unity license
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        shell: pwsh
        run: |
          if (-not $env:UNITY_LICENSE -or $env:UNITY_LICENSE.Trim().Length -eq 0) {
            Write-Host "[CI] UNITY_LICENSE not set; skipping activation."
            exit 0
          }
          $pv = Get-Content ProjectSettings/ProjectVersion.txt -Raw
          $ver = ($pv | Select-String -Pattern 'm_EditorVersion:\s*([0-9]+\.[0-9]+\.[0-9]+[a-z0-9]+)').Matches.Groups[1].Value
          if (-not $ver) {
            $ver = ($pv | Select-String -Pattern 'm_EditorVersionWithRevision:\s*([0-9]+\.[0-9]+\.[0-9]+[a-z0-9]+)').Matches.Groups[1].Value
          }
          $roots = @('C:\\Program Files\\Unity\\Hub\\Editor','D:\\Program Files\\Unity\\Hub\\Editor')
          $unity = $null
          foreach ($r in $roots) {
            $cand = Join-Path (Join-Path $r $ver) 'Editor/Unity.exe'
            if (Test-Path $cand) { $unity = $cand; break }
          }
          if (-not $unity) { $unity = 'Unity.exe' }
          [IO.File]::WriteAllText("unity.ulf", $env:UNITY_LICENSE)
          & "$unity" -batchmode -nographics -quit -manualLicenseFile "unity.ulf" -logFile - 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) { throw "Unity license activation failed with exit code $LASTEXITCODE" }

      - name: Build Android APK
        shell: pwsh
        run: .\ci\run-android-build.ps1

      - name: Upload Android build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/Android/castlebound-debug.apk
          if-no-files-found: error
          retention-days: 14
