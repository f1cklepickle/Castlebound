name: Android Debug Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    types: [synchronize, reopened, labeled]
    branches: [ main ]

concurrency:
  group: android-debug-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'apk')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          tool-cache: false

      - name: Preflight Unity license secret
        shell: bash
        run: |
          if [ -z "${{ secrets.UNITY_LICENSE }}" ]; then
            echo "::error::UNITY_LICENSE is not configured."
            exit 1
          fi

      - name: Preflight Unity account credentials
        shell: bash
        run: |
          if [ -z "${{ secrets.UNITY_EMAIL }}" ] || [ -z "${{ secrets.UNITY_PASSWORD }}" ]; then
            echo "::error::UNITY_EMAIL and UNITY_PASSWORD are required."
            exit 1
          fi

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: android-library-${{ runner.os }}-${{ hashFiles('Packages/manifest.json','ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            android-library-${{ runner.os }}-

      - name: Unity - Build Android (APK)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          unityVersion: auto
          androidExportType: androidPackage
          buildName: castlebound-debug
          buildsPath: build

      - name: Upload Android build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/Android
          if-no-files-found: error
          retention-days: 14
