name: Android Debug Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    types: [synchronize, reopened, labeled]
    branches: [ main ]

concurrency:
  group: android-debug-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'apk')
      )
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Preflight Unity license secret
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:UNITY_LICENSE)) {
            Write-Host "::error::UNITY_LICENSE is not configured."
            exit 1
          }

      - name: Preflight Unity account credentials
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:UNITY_EMAIL) -or [string]::IsNullOrWhiteSpace($env:UNITY_PASSWORD)) {
            Write-Host "::error::UNITY_EMAIL and UNITY_PASSWORD are required."
            exit 1
          }

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: android-library-${{ runner.os }}-${{ hashFiles('Packages/manifest.json','ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            android-library-${{ runner.os }}-

      - name: Unity - Build Android (APK)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          unityVersion: 2022.3.62f2
          versioning: None
          androidExportType: androidPackage
          buildName: castlebound-debug
          buildsPath: build

      - name: Upload Android build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/Android
          if-no-files-found: error
          retention-days: 14
